<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Post Highlights</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@100..800&family=Silkscreen&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Job Highlights</h1>
            <div class="header-actions">
                <label class="dummy-toggle-header" title="Skip API calls">
                    <input type="checkbox" id="dummyMode">
                    <span>👾</span>
                </label>
                <button id="themeBtn" class="icon-btn" title="Toggle Theme">🌙</button>
                <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
            </div>
        </header>

        <div id="mainView">
            <div class="actions">
                <button id="summarizeBtn" class="primary-btn">
                    <span class="btn-text">Summarize Job</span>
                    <span class="btn-loader hidden">
                        <span class="dot-loader"></span>
                    </span>
                </button>
            </div>

            <div id="results" class="hidden">
                <div class="relevance-section">
                    <div class="score-container">
                        <div class="score-label">Relevance:</div>
                        <div id="scoreSquares" class="score-squares">
                            <div class="square" data-index="1"></div>
                            <div class="square" data-index="2"></div>
                            <div class="square" data-index="3"></div>
                            <div class="square" data-index="4"></div>
                            <div class="square" data-index="5"></div>
                        </div>
                        <div id="scoreText" class="score-text">0/5</div>
                    </div>
                    <div class="timing-row">
                        <div id="timeTaken" class="time-taken"></div>
                        <button id="copyPayloadBtn" class="hidden" title="Copy raw model response">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Job Title</span>
                        <span id="jobTitle" class="value">---</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Salary</span>
                        <span id="salary" class="value">---</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Team</span>
                        <span id="team" class="value">---</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Exp Required</span>
                        <span id="expReq" class="value">---</span>
                    </div>
                </div>

                <div class="summary-section">
                    <h3>Key Highlights</h3>
                    <div id="summaryContent">
                        <p class="placeholder-text">Ready to summarize...</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="settingsView" class="hidden">
            <div class="settings-header">
                <button id="backBtn" class="icon-btn">←</button>
                <h2>Settings</h2>
            </div>
            <div class="form-group">
                <label for="provider">Model Provider</label>
                <select id="provider" class="settings-select">
                    <option value="gemini">Google Gemini</option>
                    <option value="ollama">Ollama (Local)</option>
                </select>
            </div>
            <div id="geminiSettings" class="form-group">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your Gemini API key">
                <p class="help-text">Your key is stored locally and never sent to our servers.</p>
            </div>
            <div id="ollamaSettings" class="form-group hidden">
                <div class="form-group">
                    <label for="ollamaUrl">Ollama Server URL</label>
                    <input type="text" id="ollamaUrl" placeholder="http://localhost:11434"
                        value="http://localhost:11434">
                </div>
                <div class="form-group">
                    <label for="ollamaModel">Model Name</label>
                    <div class="ollama-model-row">
                        <select id="ollamaModel" class="settings-select">
                            <option value="">Fetch models...</option>
                        </select>
                        <button id="refreshOllamaBtn" class="icon-btn small" title="Refresh Models">🔄</button>
                    </div>
                </div>
            </div>
            <div class="settings-actions">
                <button id="saveSettingsBtn" class="secondary-btn">Save Settings</button>
                <button id="resetSettingsBtn" class="secondary-btn ghost-btn">Reset Changes</button>
            </div>
            <div id="statusMsg" class="status-msg hidden">Settings saved!</div>
        </div>

        <div class="resize-handle" title="Drag to resize"></div>
    </div>
    <script src="ai_service.js"></script>
    <script src="popup.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Post Highlights</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@100..800&family=Silkscreen&display=swap"
        rel="stylesheet">
</head>

<body class="window-mode">
    <div class="container">
        <header>
            <h1>Job Highlights</h1>
            <div class="header-actions">
                <label class="dummy-toggle-header" title="Skip API calls">
                    <input type="checkbox" id="dummyMode" checked>
                    <span>👾</span>
                </label>
                <div class="font-size-controls">
                    <button id="fontDecBtn" class="icon-btn small" title="Decrease font">−</button>
                    <button id="fontIncBtn" class="icon-btn small" title="Increase font">+</button>
                </div>
                <button id="themeBtn" class="icon-btn" title="Toggle Theme">
                    <svg class="sf-icon sun-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4" fill="currentColor" />
                        <path stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41" />
                    </svg>
                    <svg class="sf-icon moon-icon hidden" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                    </svg>
                </button>
                <button id="dockBtn" class="icon-btn" title="Dock to side panel">
                    <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="M9 3v18" />
                    </svg>
                </button>
                <button id="settingsBtn" class="icon-btn" title="Settings">
                    <svg class="sf-icon" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z" />
                    </svg>
                </button>
            </div>
        </header>

        <div id="mainView">
            <div class="tab-selector">
                <label for="tabSelect">Select Tab:</label>
                <select id="tabSelect">
                    <option value="">Loading tabs...</option>
                </select>
                <button id="refreshTabsBtn" class="icon-btn small" title="Refresh tabs">
                    <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
                        <path d="M21 3v5h-5" />
                    </svg>
                </button>
            </div>

            <div class="actions">
                <button id="summarizeBtn" class="primary-btn">
                    <span class="btn-text">Summarize Job</span>
                    <span class="btn-loader hidden">
                        <span class="dot-loader"></span>
                    </span>
                </button>
            </div>

            <div id="results" class="hidden">
                <div class="relevance-section">
                    <div class="score-container">
                        <svg class="progress-ring" width="100" height="100">
                            <circle class="progress-ring__background" stroke-width="10" fill="transparent" r="40"
                                cx="50" cy="50" />
                            <circle id="scoreRing" class="progress-ring__circle" stroke-width="10" fill="transparent"
                                r="40" cx="50" cy="50" />
                        </svg>
                        <div id="scoreText" class="score-text">0%</div>
                        <div class="score-label">Relevance</div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Job Title</span>
                        <span id="jobTitle" class="value">---</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Salary</span>
                        <span id="salary" class="value">---</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Team</span>
                        <span id="team" class="value">---</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Exp Required</span>
                        <span id="expReq" class="value">---</span>
                    </div>
                </div>

                <div class="summary-section">
                    <h3>Key Highlights</h3>
                    <p id="summaryText">Ready to summarize...</p>
                </div>
            </div>
        </div>

        <div id="settingsView" class="hidden">
            <div class="settings-header">
                <button id="backBtn" class="icon-btn">←</button>
                <h2>Settings</h2>
            </div>
            <div class="form-group">
                <label for="provider">Model Provider</label>
                <select id="provider" class="settings-select">
                    <option value="gemini">Google Gemini</option>
                    <option value="ollama">Ollama (Local)</option>
                </select>
            </div>
            <div id="geminiSettings" class="form-group">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your Gemini API key">
                <p class="help-text">Your key is stored locally and never sent to our servers.</p>
            </div>
            <div id="ollamaSettings" class="form-group hidden">
                <div class="form-group">
                    <label for="ollamaUrl">Ollama Server URL</label>
                    <input type="text" id="ollamaUrl" placeholder="http://localhost:11434"
                        value="http://localhost:11434">
                </div>
                <div class="form-group">
                    <label for="ollamaModel">Model Name</label>
                    <div class="ollama-model-row">
                        <select id="ollamaModel" class="settings-select">
                            <option value="">Fetch models...</option>
                        </select>
                        <button id="refreshOllamaBtn" class="icon-btn small" title="Refresh Models">🔄</button>
                    </div>
                </div>
            </div>
            <button id="saveSettingsBtn" class="secondary-btn">Save Settings</button>
        </div>

        <div class="resize-handle" title="Drag to resize"></div>
    </div>
    <script src="ai_service.js"></script>
    <script src="window.js"></script>
</body>

</html>
